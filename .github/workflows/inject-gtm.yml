name: Inject GTM partial

on:
  push:
    branches: [ main, master ]
  workflow_dispatch: {}

# Ya NO pushea a main: inyecta GTM en una rama y abre un PR (así main tiene un
# único escritor automático directo — el pipeline de mantenimiento — y se elimina
# la carrera/divergencia). Necesita escribir la rama (contents) y abrir PRs.
permissions:
  contents: write
  pull-requests: write

jobs:
  inject:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Ensure ripgrep is present
        run: sudo apt-get update && sudo apt-get install -y ripgrep

      - name: Inject GTM partial after <body> in all HTML files
        shell: bash
        run: |
          set -euo pipefail
          PARTIAL="partials/gtm.html"
          test -f "$PARTIAL" || { echo "ERROR: $PARTIAL no existe"; exit 1; }

          # Archivos HTML candidatos (excluye carpetas típicas y el propio parcial)
          mapfile -t FILES < <(rg --files --glob '*.html' --glob '!node_modules/**' --glob '!dist/**' --glob '!build/**' --glob '!partials/**' --glob '!**/*.min.html' --glob '!**/.git/**' || true)
          echo "HTML detectados: ${#FILES[@]}"

          for f in "${FILES[@]}"; do
            # Si ya contiene GTM, no inyectar de nuevo (idempotente)
            if rg -q 'googletagmanager\.com/(gtm\.js|ns\.html)' "$f"; then
              echo "SKIP (ya tiene GTM): $f"
              continue
            fi

            # Saltar stubs de redirección (meta-refresh): GTM no aplica ahí
            if rg -q 'http-equiv="refresh"' "$f"; then
              echo "SKIP (redirect stub): $f"
              continue
            fi

            TMP="$(mktemp)"
            awk -v p="$PARTIAL" '
              BEGIN { IGNORECASE=1; injected=0 }
              {
                if (injected==0 && match($0, /<body[^>]*>/)) {
                  print
                  while ((getline line < p) > 0) print line
                  close(p)
                  injected=1
                  next
                }
                print
              }
            ' "$f" > "$TMP" && mv "$TMP" "$f"
            echo "INJECTED: $f"
          done

      - name: Verify injection in repo
        run: |
          echo "Archivos con GTM (repo):"
          rg -n "googletagmanager\.com/(gtm\.js|ns\.html)" -S || true

      - name: Open PR with GTM injection (NO direct push to main)
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail

          # Idempotencia: si la inyección no produjo cambios, todos los HTML ya
          # tienen GTM → no hay nada que proponer.
          if git diff --quiet; then
            echo "Sin cambios: todos los HTML ya tienen GTM. No se abre PR."
            exit 0
          fi

          # Dedup: no abrir un segundo PR si ya hay uno automático de GTM abierto.
          EXISTING=$(gh pr list --state open --json number,headRefName \
            --jq '[.[] | select(.headRefName | startswith("auto/gtm-inject"))] | length')
          if [ "$EXISTING" != "0" ]; then
            echo "Ya hay un PR automático de GTM abierto; no se crea otro."
            exit 0
          fi

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"

          # Commit en una RAMA dedicada (nunca en main). El [skip ci] evita
          # disparar workflows sobre esta rama de automatización.
          BRANCH="auto/gtm-inject-${{ github.run_id }}"
          git checkout -b "$BRANCH"
          git add -A
          git commit -m "fix(gtm): auto-inject GTM-W75CRTX5 partial into HTML files [skip ci]"
          git push origin "$BRANCH"

          cat > /tmp/pr-body.md <<'EOF'
          Inyección automática del parcial `partials/gtm.html` en los archivos HTML que aún no incluyen GTM.

          Este workflow ya **no** pushea a `main` directamente: abre este PR para que main tenga un único escritor automático directo (el pipeline de mantenimiento) y se elimine la divergencia / push rechazado. Revisa y fusiona para aplicar los cambios.

          _Generado automáticamente por inject-gtm.yml_
          EOF

          gh pr create \
            --base "${{ github.ref_name }}" \
            --head "$BRANCH" \
            --title "fix(gtm): inyectar GTM en HTML que no lo tienen" \
            --body-file /tmp/pr-body.md