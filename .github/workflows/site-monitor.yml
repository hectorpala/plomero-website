name: Monitor del Sitio

on:
  schedule:
    # Corre cada 6 horas
    - cron: '0 */6 * * *'
  workflow_dispatch: # Permite correr manualmente

env:
  SITE_URL: https://plomeroculiacanpro.mx
  SITE_NAME: Plomero Culiacán Pro

# Necesario para que github-script pueda listar/crear/comentar Issues.
permissions:
  contents: read
  issues: write

jobs:
  monitor:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Verificar que el sitio responda
        id: health
        continue-on-error: true
        run: |
          echo "🔍 Verificando ${{ env.SITE_URL }}..."

          # Usar User-Agent de navegador real para evitar bloqueos
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"

          # Reintentar hasta 3 veces con diferentes métodos
          for i in 1 2 3; do
            HTTP_STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ env.SITE_URL }}" \
              --max-time 30 \
              --retry 2 \
              --retry-delay 3 \
              -H "User-Agent: $UA" \
              -H "Accept: text/html" \
              --compressed \
              2>/dev/null || echo "000")

            # curl -L ya siguió las redirecciones, así que el status FINAL debe
            # ser 200. (Antes el loop aceptaba 301/302 como éxito pero site_ok
            # exigía 200 → un 3xx final rompía el retry Y marcaba caído a la vez.)
            if [ "$HTTP_STATUS" = "200" ]; then
              break
            fi
            echo "Intento $i: status $HTTP_STATUS, reintentando..."
            sleep 5
          done

          RESPONSE_TIME=$(curl -sL -o /dev/null -w "%{time_total}" "${{ env.SITE_URL }}" \
            --max-time 30 -H "User-Agent: $UA" 2>/dev/null || echo "0")

          echo "status=$HTTP_STATUS" >> $GITHUB_OUTPUT
          echo "response_time=$RESPONSE_TIME" >> $GITHUB_OUTPUT

          if [ "$HTTP_STATUS" = "200" ]; then
            echo "✅ Sitio OK - Status $HTTP_STATUS - Tiempo: ${RESPONSE_TIME}s"
            echo "site_ok=true" >> $GITHUB_OUTPUT
          else
            echo "❌ El sitio respondió con status $HTTP_STATUS"
            echo "site_ok=false" >> $GITHUB_OUTPUT
          fi

      - name: Verificar páginas importantes
        id: pages
        continue-on-error: true
        run: |
          UA="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 Chrome/120.0.0.0 Safari/537.36"

          PAGES=(
            "/"
            "/servicios/reparacion-de-fugas/"
            "/servicios/plomero-colonias-culiacan/las-quintas/"
            "/blog/"
          )

          ERRORS=""
          for page in "${PAGES[@]}"; do
            STATUS=$(curl -sL -o /dev/null -w "%{http_code}" "${{ env.SITE_URL }}${page}" \
              --max-time 15 -H "User-Agent: $UA" 2>/dev/null || echo "000")
            if [ "$STATUS" != "200" ]; then
              ERRORS="${ERRORS}❌ ${page} -> Status ${STATUS}\n"
            else
              echo "✅ ${page} -> OK"
            fi
          done

          if [ -n "$ERRORS" ]; then
            echo "pages_ok=false" >> $GITHUB_OUTPUT
            echo -e "errors<<EOF\n${ERRORS}EOF" >> $GITHUB_OUTPUT
          else
            echo "pages_ok=true" >> $GITHUB_OUTPUT
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Instalar Lighthouse
        run: npm install -g lighthouse

      - name: Correr Lighthouse (x3 para mediana; ya NO se tira el JSON)
        id: lighthouse
        continue-on-error: true
        run: |
          echo "🚀 Corriendo Lighthouse x3 (para mediana de Core Web Vitals)..."
          mkdir -p .pipeline

          for i in 1 2 3; do
            lighthouse ${{ env.SITE_URL }} \
              --output=json \
              --output-path=.pipeline/lighthouse-run-$i.json \
              --chrome-flags="--headless --no-sandbox" \
              --only-categories=performance,accessibility,best-practices,seo \
              --quiet || echo "⚠️ Lighthouse corrida $i falló (se sigue con las demás)"
          done

          # Scores = MEDIANA de las corridas que sí produjeron JSON.
          # (Antes se leía SOLO lighthouse-run-1.json: si esa corrida fallaba,
          # jq reventaba, PERF quedaba vacío, la comparación numérica moría y el
          # reporte salía con la tabla de scores en blanco.)
          RUNS=$(ls .pipeline/lighthouse-run-*.json 2>/dev/null || true)
          if [ -z "$RUNS" ]; then
            echo "⚠️ Ninguna corrida de Lighthouse produjo reporte; sin scores."
            echo "performance=" >> $GITHUB_OUTPUT
            echo "accessibility=" >> $GITHUB_OUTPUT
            echo "best_practices=" >> $GITHUB_OUTPUT
            echo "seo=" >> $GITHUB_OUTPUT
            echo "perf_warning=false" >> $GITHUB_OUTPUT
            exit 0
          fi

          med() {
            jq -s '[.[].categories[$cat].score | select(. != null) | . * 100 | floor]
                   | sort | if length == 0 then empty else .[(length - 1) / 2 | floor] end' \
              --arg cat "$1" $RUNS 2>/dev/null || true
          }
          PERF=$(med performance)
          ACCESS=$(med accessibility)
          BP=$(med best-practices)
          SEO=$(med seo)

          echo "performance=$PERF" >> $GITHUB_OUTPUT
          echo "accessibility=$ACCESS" >> $GITHUB_OUTPUT
          echo "best_practices=$BP" >> $GITHUB_OUTPUT
          echo "seo=$SEO" >> $GITHUB_OUTPUT

          echo "📊 Resultados (mediana de $(echo "$RUNS" | wc -w | tr -d ' ') corrida(s)):"
          echo "   Performance: $PERF"
          echo "   Accessibility: $ACCESS"
          echo "   Best Practices: $BP"
          echo "   SEO: $SEO"

          # Alerta si performance < 50 (solo si hubo score)
          if [ -n "$PERF" ] && [ "$PERF" -lt 50 ]; then
            echo "perf_warning=true" >> $GITHUB_OUTPUT
          else
            echo "perf_warning=false" >> $GITHUB_OUTPUT
          fi

      - name: Evaluar Core Web Vitals (presupuesto + regresión vs baseline)
        id: cwv
        continue-on-error: true
        env:
          # Umbrales de LABORATORIO (Lighthouse con throttling móvil en runner
          # compartido), NO los de campo de Google (esos son para usuarios
          # reales p75 y aquí disparaban alerta permanente — issue #2):
          # LCP 4000ms = frontera "needs improvement" de Lighthouse móvil;
          # INP 600ms porque el lab no mide INP y se usa TBT como proxy
          # (600ms = frontera "needs improvement" de TBT). CLS es igual en
          # lab y campo → se queda el default 0.1 de check-perf.mjs.
          PERF_BUDGET_LCP: "4000"
          PERF_BUDGET_INP: "600"
        run: |
          echo "📐 CWV: presupuesto lab LCP<${PERF_BUDGET_LCP}ms, CLS<0.1, TBT<${PERF_BUDGET_INP}ms + regresión vs baseline (mediana de 3)"
          REPORTS=$(ls .pipeline/lighthouse-run-*.json 2>/dev/null | paste -sd, -)
          if [ -z "$REPORTS" ]; then
            echo "⚠️ No hay reportes Lighthouse; no se evalúan CWV."
            echo "cwv_regression=false" >> $GITHUB_OUTPUT
            exit 0
          fi
          # stderr al log (antes iba a /dev/null: si el checker moría, el falso
          # negativo era invisible).
          PERF_REPORTS="$REPORTS" node .pipeline/check-perf.mjs > .pipeline/cwv-result.json 2> .pipeline/cwv-stderr.log || true
          if [ -s .pipeline/cwv-stderr.log ]; then
            sed 's/^/[check-perf stderr] /' .pipeline/cwv-stderr.log
          fi
          # Solo severidad ALTA abre/comenta Issue: las "media" (regresión vs
          # baseline, INP-proxy) varían con el ruido del runner compartido y
          # quedan visibles en el step summary sin spamear el repo.
          COUNT=$(jq '[.hallazgos[] | select(.severidad=="alta")] | length' .pipeline/cwv-result.json 2>/dev/null || echo 0)
          echo "### 📐 Core Web Vitals (presupuesto + baseline)" >> $GITHUB_STEP_SUMMARY
          jq -r '.hallazgos[]? | "- [\(.severidad)] \(.descripcion)"' .pipeline/cwv-result.json >> $GITHUB_STEP_SUMMARY 2>/dev/null || echo "- (sin datos de CWV)" >> $GITHUB_STEP_SUMMARY
          if [ "${COUNT:-0}" -gt 0 ]; then
            echo "cwv_regression=true" >> $GITHUB_OUTPUT
          else
            echo "cwv_regression=false" >> $GITHUB_OUTPUT
          fi

      - name: Subir reportes Lighthouse + resultado CWV (persistir, ya no se tiran)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lighthouse-reports
          path: |
            .pipeline/lighthouse-run-*.json
            .pipeline/cwv-result.json
          retention-days: 30
          # .pipeline/ es carpeta OCULTA: desde upload-artifact v4.4 los paths
          # ocultos se excluyen por defecto → el artefacto no se subía NUNCA
          # ("No files were found") y el Issue mandaba a un detalle inexistente.
          include-hidden-files: true
          if-no-files-found: ignore

      - name: Crear Issue si hay problemas
        if: steps.health.outputs.site_ok == 'false' || steps.pages.outputs.pages_ok == 'false' || steps.lighthouse.outputs.perf_warning == 'true' || steps.cwv.outputs.cwv_regression == 'true'
        uses: actions/github-script@v7
        # Los outputs entran por env y se leen con process.env: interpolar
        # `${{ }}` DENTRO del JavaScript inyectaba texto crudo en literales de
        # cadena — con `errors` multilínea el script moría con SyntaxError justo
        # cuando había páginas caídas que reportar.
        env:
          SITE_OK: ${{ steps.health.outputs.site_ok }}
          PAGES_OK: ${{ steps.pages.outputs.pages_ok }}
          PERF_WARNING: ${{ steps.lighthouse.outputs.perf_warning }}
          CWV_REGRESSION: ${{ steps.cwv.outputs.cwv_regression }}
          HTTP_STATUS: ${{ steps.health.outputs.status }}
          RESPONSE_TIME: ${{ steps.health.outputs.response_time }}
          PAGES_ERRORS: ${{ steps.pages.outputs.errors }}
          SCORE_PERF: ${{ steps.lighthouse.outputs.performance }}
          SCORE_ACCESS: ${{ steps.lighthouse.outputs.accessibility }}
          SCORE_BP: ${{ steps.lighthouse.outputs.best_practices }}
          SCORE_SEO: ${{ steps.lighthouse.outputs.seo }}
        with:
          script: |
            const env = process.env;
            const siteOk = env.SITE_OK === 'true';
            const pagesOk = env.PAGES_OK === 'true';
            const perfWarning = env.PERF_WARNING === 'true';
            const cwvReg = env.CWV_REGRESSION === 'true';
            const na = (v) => (v && v.trim()) ? v.trim() : 'n/a';

            const causas = [];
            let body = '## Reporte de Monitoreo\n\n';
            body += `**Fecha:** ${new Date().toLocaleString('es-MX', {timeZone: 'America/Mazatlan'})}\n\n`;

            if (!siteOk) {
              causas.push('Sitio caído');
              body += '### ❌ Estado del Sitio\n';
              body += `- Status HTTP: ${na(env.HTTP_STATUS)}\n`;
              body += `- Tiempo de respuesta: ${na(env.RESPONSE_TIME)}s\n\n`;
            }

            if (!pagesOk) {
              causas.push('Páginas con error');
              body += '### ❌ Páginas con Error\n';
              body += (env.PAGES_ERRORS || '(sin detalle)') + '\n\n';
            }

            if (perfWarning) {
              causas.push('Performance baja');
              body += '### ⚠️ Performance Baja\n\n';
            }

            if (cwvReg) {
              causas.push('CWV fuera de presupuesto/regresión');
              body += '### 📐 Core Web Vitals (presupuesto/regresión)\n';
              body += 'Una o más métricas (mediana de 3 corridas Lighthouse) superan el presupuesto de laboratorio o regresaron vs baseline. ';
              body += 'Ver el _step summary_ y el artefacto `lighthouse-reports` (JSON de las 3 corridas + `cwv-result.json`) para el detalle.\n\n';
            }

            body += '### 📊 Lighthouse Scores (mediana de 3)\n';
            body += '| Métrica | Score |\n';
            body += '|---------|-------|\n';
            body += `| Performance | ${na(env.SCORE_PERF)} |\n`;
            body += `| Accessibility | ${na(env.SCORE_ACCESS)} |\n`;
            body += `| Best Practices | ${na(env.SCORE_BP)} |\n`;
            body += `| SEO | ${na(env.SCORE_SEO)} |\n\n`;

            body += '---\n';
            body += '_Generado automáticamente por el Monitor del Sitio_';

            const title = '🚨 Alerta: ' + causas.join(' + ');

            // Dedup por etiqueta + MISMO título (misma combinación de causas):
            // así una caída real del sitio abre su propio Issue en vez de
            // quedar enterrada como comentario N del Issue de CWV.
            const label = 'monitor-automatico';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fecha = new Date().toLocaleString('es-MX', { timeZone: 'America/Mazatlan' });
            const match = existing.data.find((i) => i.title === title);

            if (match) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: match.number,
                body: `Volvió a detectarse el ${fecha}. Corrida: ${runUrl}\n\n${body}`,
              });
              core.info(`Issue #${match.number} ya existe; se agregó comentario en vez de abrir otro.`);
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: title,
                body: body,
                labels: ['bug', label]
              });
              core.info('Se creó un nuevo Issue de monitoreo.');
            }

      - name: Cerrar Issues del monitor si todo pasó
        if: steps.health.outputs.site_ok == 'true' && steps.pages.outputs.pages_ok == 'true' && steps.lighthouse.outputs.perf_warning != 'true' && steps.cwv.outputs.cwv_regression != 'true'
        uses: actions/github-script@v7
        with:
          script: |
            // Contraparte del dedup: en una corrida limpia, los Issues del
            // monitor se cierran solos (antes quedaban abiertos para siempre
            // acumulando un comentario cada 6 h).
            const label = 'monitor-automatico';
            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
            });
            const runUrl = `${context.serverUrl}/${context.repo.owner}/${context.repo.repo}/actions/runs/${context.runId}`;
            const fecha = new Date().toLocaleString('es-MX', { timeZone: 'America/Mazatlan' });
            for (const issue of existing.data) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                body: `✅ Corrida limpia del monitor el ${fecha} (sitio OK, páginas OK, performance OK, CWV dentro de presupuesto). Corrida: ${runUrl}. Se cierra automáticamente.`,
              });
              await github.rest.issues.update({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: issue.number,
                state: 'closed',
              });
              core.info(`Issue #${issue.number} cerrado (monitor en verde).`);
            }

      - name: Resumen
        run: |
          echo "## 📊 Resumen del Monitoreo" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Check | Estado |" >> $GITHUB_STEP_SUMMARY
          echo "|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Sitio Online | ${{ steps.health.outputs.site_ok == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Páginas OK | ${{ steps.pages.outputs.pages_ok == 'true' && '✅' || '❌' }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Performance | ${{ steps.lighthouse.outputs.performance }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| Accessibility | ${{ steps.lighthouse.outputs.accessibility }}% |" >> $GITHUB_STEP_SUMMARY
          echo "| SEO | ${{ steps.lighthouse.outputs.seo }}% |" >> $GITHUB_STEP_SUMMARY
